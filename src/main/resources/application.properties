spring.application.name=AuditInsight-BACKEND-SPRINGBOOT

# Database connectivity credentials
spring.r2dbc.url=${SPRING_DATABASE_URL}
spring.r2dbc.username=${SPRING_DATABASE_USERNAME}
spring.r2dbc.password=${SPRING_DATABASE_PASSWORD}

#flyway migration setup
spring.flyway.enabled=true
spring.flyway.url=${FLYWAY_URL}
spring.flyway.user=${SPRING_DATABASE_USERNAME}
spring.flyway.password=${SPRING_DATABASE_PASSWORD}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0


# OAuth authentication credentials
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# OAuth2 success redirect — frontend URL that receives the JWT token as ?token=
oauth2.success.redirect-url=http://localhost:8080/swagger-ui.html

# JWT secret credentials
jwt.secret=${JWT_SECRET}

# Brevo email service
BREVO_API=${BREVO_API_KEY}
BREVO_MAIL=${BREVO_SENDER_EMAIL}
BREVO_SENDER_NAME=${BREVO_SENDER_NAME}


# Cloudinary — file storage
CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}

# Multipart upload limit (10 MB per file)
spring.webflux.multipart.max-file-size=10MB
spring.webflux.multipart.max-request-size=10MB
spring.codec.max-in-memory-size=10MB

# Server configuration
server.port=${PORT:8080}

# Swagger/OpenAPI — serve docs under /swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
